; PlatformIO Project Configuration File for RP2350B
;
; This is a port of the ESP32 smart knob firmware to Raspberry Pi RP2350B

[platformio]
default_envs = view_rp2350b
src_dir = firmware_rp2350b/src
lib_dir = firmware_rp2350b/lib
include_dir = firmware_rp2350b/include
test_dir = firmware_rp2350b/test
data_dir = firmware_rp2350b/data

[base_config_rp2350b]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
board_build.usb_stack = tinyusb
monitor_speed = 921600
monitor_flags = 
	--eol=CRLF
	--echo
upload_speed = 921600
lib_deps =
    bxparks/AceButton @ 1.9.1
    bakercp/PacketSerial @ 1.4.0
    nanopb/Nanopb @ 0.4.7
    askuric/Simple FOC @ 2.2.0
    bodmer/TFT_eSPI @ 2.4.25
    bogde/HX711 @ 0.7.5
    adafruit/Adafruit VEML7700 Library @ 1.1.1
build_flags =
    -DMONITOR_SPEED=921600
    -DRASPBERRY_PI_PICO2=1
    -DUSE_TINYUSB=1

[env:view_rp2350b]
extends = base_config_rp2350b
lib_deps =
  ${base_config_rp2350b.lib_deps}

build_flags =
  ${base_config_rp2350b.build_flags}
  -DSK_LEDS=1
  -DNUM_LEDS=8
  -DSK_STRAIN=1
  -DSK_ALS=1
  -DSENSOR_MT6701=1
  -DSK_INVERT_ROTATION=1
  -DMOTOR_WANZHIDA_ONCE_TOP=1

  ; RP2350B Pin Configuration (from ProjectPinAssignments.xlsx)
  ; Motor PWM Pins (6PWM driver)
  -DPIN_UH=7
  -DPIN_UL=6
  -DPIN_VH=3
  -DPIN_VL=2
  -DPIN_WH=5
  -DPIN_WL=4
  
  ; Buttons
  -DPIN_BUTTON_NEXT=-1
  -DPIN_BUTTON_PREV=-1
  
  ; I2C0 (TLV493D, VEML7700)
  -DPIN_SDA=12
  -DPIN_SCL=13
  
  ; Encoder (MT6701) SPI1
  -DPIN_MT_DATA=28
  -DPIN_MT_CLOCK=30
  -DPIN_MT_CSN=29
  
  ; Addressable LED (WS2812B / SK6812)
  -DPIN_LED_DATA=27
  
  ; Display (TFT GC9A01) SPI0
  -DPIN_LCD_BACKLIGHT=16
  -DPIN_LCD_CS=17
  -DPIN_LCD_DC=15
  -DPIN_LCD_RST=20
  -DPIN_LCD_MOSI=19
  -DPIN_LCD_SCLK=18
  -DPIN_LCD_MISO=-1
  
  ; Strain Gauge (HX711)
  -DPIN_STRAIN_DO=10
  -DPIN_STRAIN_SCK=11
  
  ; TMC Diag
  -DPIN_TMC_DIAG=14

  ; Display configuration
  -DDESCRIPTION_FONT=Roboto_Thin_24
  -DDESCRIPTION_Y_OFFSET=20
  -DVALUE_OFFSET=30
  -DDRAW_ARC=0
  -DSK_BACKLIGHT_BIT_DEPTH=16

  ; TFT_eSPI setup for RP2350B
  -DUSER_SETUP_LOADED=1
  -DGC9A01_DRIVER=1
  -DCGRAM_OFFSET=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=240
  -DTFT_MISO=-1
  -DTFT_MOSI=19
  -DTFT_SCLK=18
  -DTFT_CS=17
  -DTFT_DC=15
  -DTFT_RST=20
  -DTFT_BL=-1
  -DLOAD_GLCD=1
  -DLOAD_GFXFF=1
  -DSPI_FREQUENCY=40000000

  -DCORE_DEBUG_LEVEL=0

  ; FastLED setup (WS2812B on RP2350B using PIO)
  -DFASTLED_RPI_NO_CLOCK_MASK=1
